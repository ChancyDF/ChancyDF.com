<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspirobot Image</title>
</head>
<body>
    <img id="inspirobot-image" src="" alt="Inspirobot Image">
    
    <script>
        // Function to fetch and set image source
        function fetchAndSetImage() {
            fetch("https://inspirobot.me/api?generate=true")
                .then(response => response.text())
                .then(data => {
                    // Set the image source to the fetched URL
                    document.getElementById("inspirobot-image").src = data;
                })
                .catch(error => {
                    console.error('Error fetching image:', error);
                });
        }
        
        // Initial image load
        fetchAndSetImage();
        
        // Add click event listener to refresh image
        document.getElementById("inspirobot-image").addEventListener("click", fetchAndSetImage);

        // Refresh image every 30 seconds
        setInterval(fetchAndSetImage, 30000);
    </script>
</body>
</html>
