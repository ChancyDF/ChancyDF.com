<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Title Viewer</title>
</head>
<body>

<h1>Random Title Viewer</h1>

<button onclick="fetchRandomTitle()">Show Random Title</button>

<div id="result"></div>

<script>
    function fetchRandomTitle() {
        // Fetch the titles.txt content
        fetch('titles.txt')
            .then(response => response.text())
            .then(data => {
                // Split the content into lines
                let lines = data.split('\n');

                // Remove any empty lines
                let nonEmptyLines = lines.filter(line => line.trim() !== '');

                // Get a random line
                if (nonEmptyLines.length > 0) {
                    let randomLine = nonEmptyLines[Math.floor(Math.random() * nonEmptyLines.length)];
                    document.getElementById('result').textContent = randomLine.trim();
                } else {
                    document.getElementById('result').textContent = 'No non-empty lines found.';
                }
            })
            .catch(error => {
                console.error('Error fetching titles.txt:', error);
            });
    }
</script>

</body>
</html>
