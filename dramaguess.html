<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Drama Cell Viewer</title>
</head>
<body>

<h1>Random Drama Cell Viewer</h1>

<button onclick="fetchRandomCell()">Show Random Cell</button>

<div id="result"></div>

<script>
    function fetchRandomCell() {
        // Fetch the dramasheet.html content
        fetch('dramasheet.html')
            .then(response => response.text())
            .then(data => {
                // Parse the HTML content
                let parser = new DOMParser();
                let doc = parser.parseFromString(data, 'text/html');

                // Get all non-empty cells
                let nonEmptyCells = Array.from(doc.querySelectorAll('td'))
                    .filter(cell => cell.textContent.trim() !== '');

                // Display a random non-empty cell content
                if (nonEmptyCells.length > 0) {
                    let randomCell = nonEmptyCells[Math.floor(Math.random() * nonEmptyCells.length)];
                    document.getElementById('result').textContent = randomCell.textContent.trim();
                } else {
                    document.getElementById('result').textContent = 'No non-empty cells found.';
                }
            })
            .catch(error => {
                console.error('Error fetching dramasheet.html:', error);
            });
    }
</script>

</body>
</html>
