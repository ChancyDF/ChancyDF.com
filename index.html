<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChancyDF.com</title>
    <style>
        body {
            font-family: 'Arial', sans-serif; /* Default font */
            margin: 0;
            padding: 0;
            background-color: #332534; /* Default Dark Theme */
            color: #fff; /* Default text color */
        }

        header {
            background-color: #120F12; /* Dark Theme color for the bar at the top */
            color: #fff; /* Text color on the bar */
            padding: 10px;
            text-align: center;
        }

        #logo {
            max-width: 10%;
            height: auto;
            cursor: pointer;
        }

        #themeToggle {
            float: right;
            cursor: pointer;
            margin-right: 10px;
            width: 30px;
            height: 30px;
            background-size: cover;
            background-repeat: no-repeat;
        }

        #dramaGuessButton {
            display: block;
            margin: 20px auto;
            padding: 10px;
            background-color: #FAB8FF; /* Button background color */
            color: #332534; /* Button text color */
            text-decoration: none;
            text-align: center;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <a href="homepage.html"> <!-- Updated link to the homepage -->
            <img id="logo" src="logo.png" alt="ChancyDF Logo">
        </a>
        <div id="themeToggle" onclick="toggleTheme()"></div>
    </header>

    <!-- Content of the homepage goes here -->

    <!-- Button to redirect to "chancydf.com/dramaguess" -->
    <a id="dramaGuessButton" href="https://chancydf.com/dramaguess">
        <img src="dramaguessbutton.png" alt="Drama Guess Button">
    </a>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');

            if (body.style.backgroundColor === 'rgb(245, 229, 246)') {
                body.style.backgroundColor = '#332534'; // Dark Theme
                document.querySelector('header').style.backgroundColor = '#120F12';
                body.style.color = '#fff';
                themeToggle.style.backgroundImage = 'url("togglelight.png")';
            } else {
                body.style.backgroundColor = '#F5E5F6'; // Light Theme
                document.querySelector('header').style.backgroundColor = '#FAB8FF';
                body.style.color = '#333';
                themeToggle.style.backgroundImage = 'url("toggledark.png")';
            }
        }

        // Set initial theme toggle image
        document.getElementById('themeToggle').style.backgroundImage = 'url("togglelight.png")';
    </script>
</body>
</html>
