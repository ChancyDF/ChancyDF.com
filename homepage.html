<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChancyDF.com</title>
    <style>
        body {
            font-family: 'Arial', sans-serif; /* Default font */
            margin: 0;
            padding: 0;
            color: #fff; /* Default text color */
        }

        header {
            background-color: #120F12; /* Dark Theme color for the bar at the top */
            color: #fff; /* Text color on the bar */
            padding: 10px;
            text-align: center;
        }

        #logo {
            max-width: 10%;
            height: auto;
            cursor: pointer;
        }

        #themeToggle {
            float: right;
            cursor: pointer;
            margin-right: 10px;
            width: 30px;
            height: 30px;
            background-size: cover;
            background-repeat: no-repeat;
        }

        #typewriterHeader {
            overflow: hidden;
            white-space: nowrap;
            margin: 0;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">
            <img id="logo" src="logo.png" alt="ChancyDF Logo">
        </a>
        <div id="themeToggle" onclick="toggleTheme()"></div>
    </header>

    <!-- Content of the homepage goes here -->
    <div id="typewriterHeader">Whats up lmao</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            animateTypewriter('typewriterHeader', 'Whats up lmao', 50);
        });

        function animateTypewriter(elementId, text, speed) {
            const element = document.getElementById(elementId);
            let index = 0;

            function typeWriter() {
                if (index < text.length) {
                    element.innerHTML += text.charAt(index);
                    index++;
                    setTimeout(typeWriter, Math.floor(Math.random() * (300 - 50 + 1)) + 50);
                }
            }

            typeWriter();
        }

        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');

            if (body.style.backgroundColor === 'rgb(245, 229, 246)') {
                body.style.backgroundColor = '#332534'; // Dark Theme
                document.querySelector('header').style.backgroundColor = '#120F12';
                body.style.color = '#fff';
                themeToggle.style.backgroundImage = 'url("togglelight.png")';
            } else {
                body.style.backgroundColor = '#F5E5F6'; // Light Theme
                document.querySelector('header').style.backgroundColor = '#FAB8FF';
                body.style.color = '#120F12';
                themeToggle.style.backgroundImage = 'url("toggledark.png")';
            }
        }

        // Set initial theme toggle image
        document.getElementById('themeToggle').style.backgroundImage = 'url("togglelight.png")';
    </script>
</body>
</html>
