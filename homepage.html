<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChancyDF.com</title>
    <style>
        body {
            font-family: 'Arial', sans-serif; /* Default font */
            margin: 0;
            padding: 0;
            background-color: #332534; /* Default Dark Theme */
            color: #fff; /* Default text color */
            transition: background-color 0.3s, color 0.3s;
        }

        header {
            background-color: #120F12; /* Dark Theme color for the bar at the top */
            color: #fff; /* Text color on the bar */
            padding: 10px;
            text-align: center;
        }

        #logo {
            max-width: 10%;
            height: auto;
            cursor: pointer;
        }

        #themeToggle {
            float: right;
            cursor: pointer;
            margin-right: 10px;
            width: 30px;
            height: 30px;
            background-size: cover;
            background-repeat: no-repeat;
        }

        .typewriter {
            overflow: hidden;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 0.1em;
            animation: typing 2s steps(22, end), blink-caret 0.5s step-end infinite alternate;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #fff; }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">
            <img id="logo" src="logo.png" alt="ChancyDF Logo">
        </a>
        <div id="themeToggle" onclick="toggleTheme()"></div>
    </header>

    <!-- Content of the homepage goes here -->
    <div class="typewriter">
        <h1>whats up lmao</h1>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');

            if (body.style.backgroundColor === 'rgb(245, 229, 246)') {
                body.style.backgroundColor = '#332534'; // Dark Theme
                document.querySelector('header').style.backgroundColor = '#120F12';
                body.style.color = '#fff';
                themeToggle.style.backgroundImage = 'url("togglelight.png")';
            } else {
                body.style.backgroundColor = '#F5E5F6'; // Light Theme
                document.querySelector('header').style.backgroundColor = '#FAB8FF';
                body.style.color = '#120F12';
                themeToggle.style.backgroundImage = 'url("toggledark.png")';
            }
        }

        // Set initial theme toggle image
        document.getElementById('themeToggle').style.backgroundImage = 'url("togglelight.png")';
    </script>
</body>
</html>
