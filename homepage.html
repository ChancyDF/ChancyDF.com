<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChancyDF.com</title>
    <style>
        body {
            font-family: 'Arial', sans-serif; /* Default font */
            margin: 0;
            padding: 0;
            background-color: #332534; /* Default Dark Theme */
            color: #fff; /* Default text color */
        }

        header {
            background-color: #120F12; /* Dark Theme color for the bar at the top */
            color: #fff; /* Text color on the bar */
            padding: 10px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #logo {
            max-width: 10%;
            height: auto;
            cursor: pointer;
        }

        #suggestButton {
            padding: 8px 16px;
            border: 1px solid rgba(0, 0, 0, 0.3); /* Black outline at 30% opacity */
            border-radius: 5px; /* Rounded edges */
            background-color: transparent;
            color: #fff;
            cursor: pointer;
            transition: box-shadow 0.3s;
        }

        #suggestButton:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* Drop shadow on hover */
        }

        #themeToggle {
            float: right;
            cursor: pointer;
            margin-right: 10px;
            width: 30px;
            height: 30px;
            background-size: cover;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <header>
        <a href="chancydf.com/homepage"> <!-- Updated homepage link -->
            <img id="logo" src="logo.png" alt="ChancyDF Logo">
        </a>
        <button id="suggestButton" onclick="redirectToSuggestPage()">Suggest an Idea!</button>
        <div id="themeToggle" onclick="toggleTheme()"></div>
    </header>

    <!-- Content of the homepage goes here -->

    <script>
        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');

            if (body.style.backgroundColor === 'rgb(245, 229, 246)') {
                body.style.backgroundColor = '#332534'; // Dark Theme
                document.querySelector('header').style.backgroundColor = '#120F12';
                body.style.color = '#fff';
                themeToggle.style.backgroundImage = 'url("togglelight.png")';
            } else {
                body.style.backgroundColor = '#F5E5F6'; // Light Theme
                document.querySelector('header').style.backgroundColor = '#FAB8FF';
                body.style.color = '#333';
                themeToggle.style.backgroundImage = 'url("toggledark.png")';
            }
        }

        // Set initial theme toggle image
        document.getElementById('themeToggle').style.backgroundImage = 'url("togglelight.png")';

        function redirectToSuggestPage() {
            window.location.href = 'http://chancydf.com/suggest';
        }
    </script>
</body>
</html>
